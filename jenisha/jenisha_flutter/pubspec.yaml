name: jenisha_flutter
description: Flutter port of the provided design
publish_to: 'none'
version: 0.1.0
environment:
  sdk: '>=2.18.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.2
  firebase_core: ^2.24.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.13.0
  firebase_storage: ^11.5.0
  google_sign_in: ^6.2.0
  image_picker: ^1.0.0
  url_launcher: ^6.1.11
  intl: ^0.20.2
  google_fonts: ^5.0.0
  collection: ^1.17.0
  provider: ^6.0.5
  shared_preferences: ^2.2.2
  http: ^1.1.0
  translator: ^1.0.0
  path_provider: ^2.1.0
  permission_handler: ^11.0.0
  razorpay_flutter: ^1.3.7
  file_picker: ^8.0.0
  marquee: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.0

flutter:
  uses-material-design: true
  assets:
    - images/new_logo.jpeg
    - images/log.png

# Configuration for flutter_launcher_icons
flutter_icons:
  android: true
  ios: false
  image_path: "images/new_logo.jpeg"
